<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="-apple-system, Segoe UI, system-ui, sans-serif" role="img" aria-label="JIT Re-Rank animation: it learns your taste and slides matching items to the top, in place.">
  <style>
    .move { animation-duration: 5.5s; animation-iteration-count: infinite; animation-timing-function: cubic-bezier(.6,0,.2,1); }
    .rowA { animation-name: mvA; } .rowB { animation-name: mvB; } .rowC { animation-name: mvC; }
    .rowD { animation-name: mvD; } .rowE { animation-name: mvE; }
    @keyframes mvA { 0%,15%{transform:translateY(78px)} 40%,82%{transform:translateY(158px)} 96%,100%{transform:translateY(78px)} }
    @keyframes mvB { 0%,15%{transform:translateY(118px)} 40%,82%{transform:translateY(198px)} 96%,100%{transform:translateY(118px)} }
    @keyframes mvC { 0%,15%{transform:translateY(158px)} 40%,82%{transform:translateY(78px)}  96%,100%{transform:translateY(158px)} }
    @keyframes mvD { 0%,15%{transform:translateY(198px)} 40%,82%{transform:translateY(238px)} 96%,100%{transform:translateY(198px)} }
    @keyframes mvE { 0%,15%{transform:translateY(238px)} 40%,82%{transform:translateY(118px)} 96%,100%{transform:translateY(238px)} }
    .glow  { animation: glow 5.5s infinite; }
    @keyframes glow { 0%,30%{opacity:0} 45%,80%{opacity:1} 90%,100%{opacity:0} }
    .capL  { animation: capL 5.5s infinite; } .capR { animation: capR 5.5s infinite; }
    @keyframes capL { 0%,30%{opacity:1} 40%,100%{opacity:0} }
    @keyframes capR { 0%,38%{opacity:0} 45%,88%{opacity:1} 96%,100%{opacity:0} }
    .pulse { animation: pulse 5.5s infinite; }
    @keyframes pulse { 0%,30%{opacity:.55} 45%,82%{opacity:1} 92%,100%{opacity:.55} }
  </style>

  <!-- panel -->
  <rect x="1" y="1" width="558" height="318" rx="16" fill="#18181b" stroke="#ffffff" stroke-opacity="0.08"/>
  <!-- header -->
  <circle cx="30" cy="34" r="5" fill="#3b82f6"/>
  <text x="44" y="39" fill="#f4f4f5" font-size="17" font-weight="700">JIT Re-Rank</text>
  <text x="160" y="39" fill="#a1a1aa" font-size="12.5">learns your taste, re-ranks the list in place</text>
  <!-- pill -->
  <rect x="470" y="22" width="74" height="24" rx="12" fill="#27272a" stroke="#ffffff" stroke-opacity="0.12"/>
  <circle cx="486" cy="34" r="3.5" fill="#3b82f6"/>
  <text x="496" y="38" fill="#e4e4e7" font-size="11" font-weight="600">re-rank</text>

  <!-- glow highlight on the new #1 slot -->
  <rect class="glow" x="22" y="76" width="436" height="36" rx="9" fill="none" stroke="#3b82f6" stroke-width="2"/>

  <!-- rows: each <g> slides between its original and re-ranked slot -->
  <!-- A: Sourdough (cooking) -->
  <g class="move rowA">
    <rect x="24" y="0" width="432" height="32" rx="7" fill="#232327"/>
    <text x="42" y="21" fill="#e4e4e7" font-size="13.5">Sourdough Baking 101</text>
    <rect x="366" y="7" width="76" height="18" rx="9" fill="#27272a"/>
    <text x="404" y="20" fill="#a1a1aa" font-size="10.5" text-anchor="middle">cooking</text>
  </g>
  <!-- B: Travel -->
  <g class="move rowB">
    <rect x="24" y="0" width="432" height="32" rx="7" fill="#232327"/>
    <text x="42" y="21" fill="#e4e4e7" font-size="13.5">Bali Travel Diary</text>
    <rect x="374" y="7" width="68" height="18" rx="9" fill="#27272a"/>
    <text x="408" y="20" fill="#a1a1aa" font-size="10.5" text-anchor="middle">travel</text>
  </g>
  <!-- C: Rust (dev) — relevant, rises to #1 -->
  <g class="move rowC">
    <rect x="24" y="0" width="432" height="32" rx="7" fill="#232327"/>
    <text x="42" y="21" fill="#f4f4f5" font-size="13.5" font-weight="600">Rust Async Patterns</text>
    <rect class="pulse" x="386" y="7" width="56" height="18" rx="9" fill="#3b82f6" fill-opacity="0.22"/>
    <text class="pulse" x="414" y="20" fill="#93c5fd" font-size="10.5" font-weight="600" text-anchor="middle">dev</text>
  </g>
  <!-- D: Art -->
  <g class="move rowD">
    <rect x="24" y="0" width="432" height="32" rx="7" fill="#232327"/>
    <text x="42" y="21" fill="#e4e4e7" font-size="13.5">Watercolor Basics</text>
    <rect x="392" y="7" width="50" height="18" rx="9" fill="#27272a"/>
    <text x="417" y="20" fill="#a1a1aa" font-size="10.5" text-anchor="middle">art</text>
  </g>
  <!-- E: Compiler (systems) — relevant, rises to #2 -->
  <g class="move rowE">
    <rect x="24" y="0" width="432" height="32" rx="7" fill="#232327"/>
    <text x="42" y="21" fill="#f4f4f5" font-size="13.5" font-weight="600">Building a Compiler</text>
    <rect class="pulse" x="366" y="7" width="76" height="18" rx="9" fill="#3b82f6" fill-opacity="0.22"/>
    <text class="pulse" x="404" y="20" fill="#93c5fd" font-size="10.5" font-weight="600" text-anchor="middle">systems</text>
  </g>

  <!-- caption -->
  <text class="capL" x="30" y="298" fill="#a1a1aa" font-size="13">🧠 learning what you like…</text>
  <text class="capR" x="30" y="298" fill="#6ee7b7" font-size="13" font-weight="600">✓ re-ranked — dev &amp; systems on top, no page reload</text>
</svg>
