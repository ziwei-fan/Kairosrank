<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="-apple-system, Segoe UI, system-ui, sans-serif" role="img" aria-label="Kairosrank (JIT Re-Rank) pipeline: it senses the list, learns your taste on-device, picks the right moment, scores by similarity, and re-ranks the page in place — no reload.">
  <style>
    /* one shared 9s timeline drives every stage */
    .prog { transform-box: fill-box; transform-origin: left center; animation: prog 9s infinite; }
    @keyframes prog { 0%,5%{transform:scaleX(0)} 24%{transform:scaleX(.25)} 42%{transform:scaleX(.5)} 57%{transform:scaleX(.75)} 73%,95%{transform:scaleX(1)} 100%{transform:scaleX(0)} }

    .n1{animation:n1 9s infinite}.n2{animation:n2 9s infinite}.n3{animation:n3 9s infinite}.n4{animation:n4 9s infinite}.n5{animation:n5 9s infinite}
    @keyframes n1{0%,4%{fill:#3f3f46}6%,96%{fill:#3b82f6}100%{fill:#3f3f46}}
    @keyframes n2{0%,23%{fill:#3f3f46}25%,96%{fill:#3b82f6}100%{fill:#3f3f46}}
    @keyframes n3{0%,41%{fill:#3f3f46}43%,96%{fill:#3b82f6}100%{fill:#3f3f46}}
    @keyframes n4{0%,56%{fill:#3f3f46}58%,96%{fill:#3b82f6}100%{fill:#3f3f46}}
    @keyframes n5{0%,72%{fill:#3f3f46}74%,96%{fill:#3b82f6}100%{fill:#3f3f46}}

    .cap1{animation:cap1 9s infinite}.cap2{animation:cap2 9s infinite}.cap3{animation:cap3 9s infinite}.cap4{animation:cap4 9s infinite}.cap5{animation:cap5 9s infinite}
    @keyframes cap1{0%,3%{opacity:0}6%,20%{opacity:1}23%,100%{opacity:0}}
    @keyframes cap2{0%,22%{opacity:0}25%,38%{opacity:1}41%,100%{opacity:0}}
    @keyframes cap3{0%,40%{opacity:0}43%,53%{opacity:1}56%,100%{opacity:0}}
    @keyframes cap4{0%,55%{opacity:0}58%,70%{opacity:1}72%,100%{opacity:0}}
    @keyframes cap5{0%,72%{opacity:0}75%,94%{opacity:1}98%,100%{opacity:0}}

    .sense{opacity:0;animation:sense 9s infinite}
    @keyframes sense{0%,4%{opacity:0}6%{opacity:.9}11%{opacity:.3}16%{opacity:.9}21%,100%{opacity:0}}

    .score{opacity:0;animation:score 9s infinite}
    @keyframes score{0%,56%{opacity:0}61%,94%{opacity:1}99%,100%{opacity:0}}

    .glow{opacity:0;animation:glow 9s infinite}
    @keyframes glow{0%,74%{opacity:0}82%,93%{opacity:1}98%,100%{opacity:0}}

    .card{animation-duration:9s;animation-iteration-count:infinite;animation-timing-function:cubic-bezier(.6,0,.2,1)}
    .mvA{animation-name:mvA}.mvB{animation-name:mvB}.mvC{animation-name:mvC}.mvD{animation-name:mvD}.mvE{animation-name:mvE}
    @keyframes mvA{0%,73%{transform:translateY(0)}82%,93%{transform:translateY(156px)}100%{transform:translateY(0)}}
    @keyframes mvB{0%,73%{transform:translateY(0)}82%,93%{transform:translateY(-52px)}100%{transform:translateY(0)}}
    @keyframes mvC{0%,73%{transform:translateY(0)}82%,93%{transform:translateY(104px)}100%{transform:translateY(0)}}
    @keyframes mvD{0%,73%{transform:translateY(0)}82%,93%{transform:translateY(-104px)}100%{transform:translateY(0)}}
    @keyframes mvE{0%,73%{transform:translateY(0)}82%,93%{transform:translateY(-104px)}100%{transform:translateY(0)}}
  </style>

  <!-- panel -->
  <rect x="1" y="1" width="638" height="398" rx="16" fill="#18181b" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- header -->
  <circle cx="26" cy="28" r="5" fill="#3b82f6"/>
  <text x="38" y="33" fill="#f4f4f5" font-size="16" font-weight="700">Kairosrank</text>
  <text x="132" y="33" fill="#a1a1aa" font-size="11.5">learns your taste, then re-ranks the page in place</text>
  <rect x="520" y="18" width="100" height="21" rx="10.5" fill="#27272a" stroke="#ffffff" stroke-opacity="0.10"/>
  <circle cx="536" cy="28.5" r="3.2" fill="#6ee7b7"/>
  <text x="546" y="32.5" fill="#a7f3d0" font-size="10.5" font-weight="600">on-device</text>

  <!-- pipeline stepper -->
  <line x1="70" y1="70" x2="550" y2="70" stroke="#3f3f46" stroke-width="3" stroke-linecap="round"/>
  <rect class="prog" x="70" y="68.5" width="480" height="3" rx="1.5" fill="#3b82f6"/>
  <g font-size="11" font-weight="700" fill="#f4f4f5" text-anchor="middle">
    <circle class="n1" cx="70"  cy="70" r="11" fill="#3f3f46"/><text x="70"  y="74">1</text>
    <circle class="n2" cx="190" cy="70" r="11" fill="#3f3f46"/><text x="190" y="74">2</text>
    <circle class="n3" cx="310" cy="70" r="11" fill="#3f3f46"/><text x="310" y="74">3</text>
    <circle class="n4" cx="430" cy="70" r="11" fill="#3f3f46"/><text x="430" y="74">4</text>
    <circle class="n5" cx="550" cy="70" r="11" fill="#3f3f46"/><text x="550" y="74">5</text>
  </g>
  <g font-size="10.5" fill="#d4d4d8" text-anchor="middle">
    <text x="70"  y="92">Sense</text>
    <text x="190" y="92">Learn</text>
    <text x="310" y="92">Time</text>
    <text x="430" y="92">Rank</text>
    <text x="550" y="92">Re-rank</text>
  </g>

  <!-- narrated caption (one per stage) -->
  <g font-size="12" text-anchor="middle">
    <text class="cap1" x="320" y="114" fill="#a1a1aa">① detecting the items already on the page…</text>
    <text class="cap2" x="320" y="114" fill="#a1a1aa">② learning your taste on-device (embeddings → preference)…</text>
    <text class="cap3" x="320" y="114" fill="#a1a1aa">③ kairos — is this the right moment to act?</text>
    <text class="cap4" x="320" y="114" fill="#a1a1aa">④ scoring each item by similarity to your taste…</text>
    <text class="cap5" x="320" y="114" fill="#6ee7b7" font-weight="600">⑤ re-ranked in place — matches on top, no reload</text>
  </g>

  <!-- the listing (arXiv-style cards). Each &lt;g&gt; slides from its start slot to its re-ranked slot. -->
  <!-- start order A,B,C,D,E at slots 130/182/234/286/338 → re-ranked B,D,E,A,C -->

  <!-- A: non-match, sinks -->
  <g class="card mvA">
    <rect x="22" y="130" width="596" height="44" rx="8" fill="#232327"/>
    <text x="40" y="152" fill="#e4e4e7" font-size="13">Scaling Data Augmentation for Robust NLP</text>
    <text x="40" y="167" fill="#71717a" font-size="10.5">cs.LG · arXiv:2602.04417 · data augmentation</text>
    <g class="score"><rect x="540" y="143" width="56" height="18" rx="9" fill="#27272a"/><text x="568" y="156" fill="#a1a1aa" font-size="10.5" font-weight="600" text-anchor="middle">0.28</text></g>
  </g>
  <!-- B: match, rises to #1 -->
  <g class="card mvB">
    <rect x="22" y="182" width="596" height="44" rx="8" fill="#232327"/>
    <text x="40" y="204" fill="#f4f4f5" font-size="13" font-weight="600">Diffusion LLMs for Fast Speculative Decoding</text>
    <text x="40" y="219" fill="#71717a" font-size="10.5">cs.CL · arXiv:2602.11930 · efficient inference</text>
    <g class="score"><rect x="540" y="195" width="56" height="18" rx="9" fill="#3b82f6" fill-opacity="0.22"/><text x="568" y="208" fill="#93c5fd" font-size="10.5" font-weight="700" text-anchor="middle">0.94</text></g>
  </g>
  <!-- C: non-match, sinks -->
  <g class="card mvC">
    <rect x="22" y="234" width="596" height="44" rx="8" fill="#232327"/>
    <text x="40" y="256" fill="#e4e4e7" font-size="13">Graph Nets for Molecular Property Prediction</text>
    <text x="40" y="271" fill="#71717a" font-size="10.5">cs.LG · arXiv:2601.98812 · molecular graphs</text>
    <g class="score"><rect x="540" y="247" width="56" height="18" rx="9" fill="#27272a"/><text x="568" y="260" fill="#a1a1aa" font-size="10.5" font-weight="600" text-anchor="middle">0.21</text></g>
  </g>
  <!-- D: match, rises -->
  <g class="card mvD">
    <rect x="22" y="286" width="596" height="44" rx="8" fill="#232327"/>
    <text x="40" y="308" fill="#f4f4f5" font-size="13" font-weight="600">Speculative Decoding at Scale</text>
    <text x="40" y="323" fill="#71717a" font-size="10.5">cs.CL · arXiv:2602.07705 · fast decoding</text>
    <g class="score"><rect x="540" y="299" width="56" height="18" rx="9" fill="#3b82f6" fill-opacity="0.22"/><text x="568" y="312" fill="#93c5fd" font-size="10.5" font-weight="700" text-anchor="middle">0.90</text></g>
  </g>
  <!-- E: match, rises -->
  <g class="card mvE">
    <rect x="22" y="338" width="596" height="44" rx="8" fill="#232327"/>
    <text x="40" y="360" fill="#f4f4f5" font-size="13" font-weight="600">Quantized Attention Kernels for On-Device Inference</text>
    <text x="40" y="375" fill="#71717a" font-size="10.5">cs.PF · arXiv:2601.15540 · quantization</text>
    <g class="score"><rect x="540" y="351" width="56" height="18" rx="9" fill="#3b82f6" fill-opacity="0.22"/><text x="568" y="364" fill="#93c5fd" font-size="10.5" font-weight="700" text-anchor="middle">0.86</text></g>
  </g>

  <!-- Stage ① overlay: dashed "detected" outlines on each slot -->
  <g class="sense" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5 4">
    <rect x="22" y="130" width="596" height="44" rx="8"/>
    <rect x="22" y="182" width="596" height="44" rx="8"/>
    <rect x="22" y="234" width="596" height="44" rx="8"/>
    <rect x="22" y="286" width="596" height="44" rx="8"/>
    <rect x="22" y="338" width="596" height="44" rx="8"/>
  </g>

  <!-- Stage ⑤ glow on the new #1 slot -->
  <rect class="glow" x="20" y="128" width="600" height="48" rx="9" fill="none" stroke="#3b82f6" stroke-width="2"/>
</svg>
